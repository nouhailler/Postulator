version: "3.9"

# ============================================================
# Postulator – Docker Compose (développement)
# ============================================================
# Prérequis : Docker + Docker Compose v2
# Ollama tourne en NATIF sur la machine hôte (accès GPU local)
# → on l'atteint via host.docker.internal
#
# Lancement :
#   docker compose up -d
#   docker compose logs -f api
# ============================================================

services:

  # ── Redis (broker Celery + cache) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: postulator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postulator_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./postulator.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # Ollama tourne sur l'hôte, pas dans Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - DEBUG=true
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"   # accès Ollama sur hôte (Linux)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Worker Celery ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postulator_worker
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q celery
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./postulator.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend React/Vite (dev HMR) ────────────────────────
  frontend:
    image: node:20-alpine
    container_name: postulator_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules          # évite d'écraser node_modules local
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  redis_data:
  uploads_data:
  logs_data:
